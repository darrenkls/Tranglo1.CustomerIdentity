<html lang="en">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tranglo – Maintenance</title>
  <style>
	html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Montserrat', system-ui, sans-serif;
	}
	body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      color: #1D285A;
      text-align: center;
      height: 100vh;
    }
    .hero img {
      top: 80px;
      left: 376px;
      width: 614px;
      height: 415px;
      opacity: 1;
    }
    .message {
      top: 532px;
      left: 404px;
      width: 557px;
      height: 42px;
      font: var(--unnamed-font-style-normal) normal var(--unnamed-font-weight-medium) var(--unnamed-font-size-14)/var(--unnamed-line-spacing-24) var(--unnamed-font-family-montserrat);
      letter-spacing: var(--unnamed-character-spacing-0);
      color: var(--unnamed-color-1d285a);
      text-align: center;
      font: normal normal medium 14px/24px Montserrat;
      letter-spacing: 0px;
      color: #1D285A;
      opacity: 1;
    }
    .social {
      margin-top:1rem;
      display:flex;
      gap:1rem;
      justify-content:center;
      flex-wrap:wrap;
    }
    .social-icon {
      top:600px;
	  width:20px;
	  height:20px;
      display:grid;
	  place-items:center;
      border:1px solid #E5EEF6;
      border-radius:10px;
      background:#fff;
      transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
	}
	
	/* Hover states with brand colors */
    .social-icon.linkedin:hover svg { left:604px; }
    .social-icon.x:hover svg { left:639px; }
    .social-icon.facebook:hover svg { left:673px; }
    .social-icon.instagram:hover svg { left:708px; }
    .social-icon.youtube:hover svg { left:742px; }
	
	.social-icon:hover {
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(0,0,0,.1);
      border-color:transparent;
	}
    .help {
      top: 649px;
      left: 510px;
      width: 346px;
      height: 18px;
      font: var(--unnamed-font-style-normal) normal var(--unnamed-font-weight-medium) var(--unnamed-font-size-14)/var(--unnamed-line-spacing-24) var(--unnamed-font-family-montserrat);
      letter-spacing: var(--unnamed-character-spacing-0);
      text-align: center;
      font: normal normal medium 14px/24px Montserrat;
      letter-spacing: 0px;
      opacity: 1;
    }
    .help a {
      color:#16BCEF;
      text-decoration:underline;
    }
  </style>
